name: CI (lint, type-check, build)

# Publishing moved to publish.yml (verified path: CI publish WITH provenance).
# This workflow is CI only — it never publishes, so a non-provenance publish
# can't accidentally fire on a tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Build (tsc + icons)
        run: npm run build
